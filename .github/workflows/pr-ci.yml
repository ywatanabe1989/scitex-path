name: pr-ci

# Consolidated PR-only CI gate. Runs the per-PR validation suite as a
# single workflow so the cancel-in-progress concurrency group, path
# filters, and uv cache apply uniformly. Post-merge validation lives
# in release-ci.yml.
#
# L1 concurrency — cancel superseded PR runs.
# L3 path filters — skip docs/skills/examples/markdown-only PRs.
# L4 conditional matrix — full ["3.11", "3.12", "3.13"] on PR (this trigger).
# L5a uv-managed Python (`uv python install` + `uv venv --python`) so the
#     matrix leg is not bound to the runner's system Python.
# L5b .venv/bin on PATH (and explicit `.venv/bin/python` for clarity) so
#     console scripts resolve without needing `uv run`.

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '_skills/**'
      - 'examples/**'
      - '**.md'
      - 'CHANGELOG.*'
      - '.github/CODEOWNERS'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  import-smoke:
    name: import-smoke-on-ubuntu-py3-12
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Set up Python 3.12 (uv-managed)
        run: uv python install 3.12
      - name: Install (no extras) in uv venv
        run: |
          uv venv --python 3.12 .venv
          uv pip install --python .venv/bin/python -e .
      - name: Import smoke
        run: .venv/bin/python -c "import scitex_path; print(getattr(scitex_path, '__version__', 'unversioned'))"
  dep-hygiene-smoke:
    name: dep-hygiene-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Set up Python 3.11 (uv-managed)
        run: uv python install 3.11
      - name: Bare install (no extras) in uv venv
        run: |
          uv venv --python 3.11 .venv
          uv pip install --python .venv/bin/python .
      - name: Import package
        run: .venv/bin/python -c "import scitex_path; print(scitex_path.__name__)"

  tests:
    name: pytest-matrix-on-ubuntu-py${{ matrix.python-version }}
    # Self-hosted Spartan CPU runner (label: spartan-cpu). The runner
    # srun --overlaps an ALREADY-RUNNING SLURM lease, and CI runs INSIDE a
    # reused, pre-built SIF (~/.scitex/dev/containers/ci-cpu.sif on punim0264)
    # that bakes python3.11/3.12/3.13 + the curated ecosystem dep union
    # (scientific core + scitex basics + scitex-dev[all,dev] + pytest). Each
    # run only overlays the checkout via PYTHONPATH — NO per-run install. The
    # SIF IS the cache; rebuild via `scitex-container apptainer build ci-cpu`.
    # fail-loud: a missing SIF / missing dep is a hard error, never a reinstall.
    runs-on: [self-hosted, Linux, X64, spartan-cpu]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ github.event_name == 'pull_request' && fromJson('["3.11", "3.12", "3.13"]') || fromJson('["3.12"]') }}
    steps:
      - uses: actions/checkout@v4
      - name: Run tests in the reused CI SIF (apptainer exec — no per-run install)
        run: |
          set -euo pipefail
          # The runner's job shell is --noprofile --norc (no Lmod), so put the
          # self-contained apptainer shim on PATH (it execs the real Apptainer
          # binary directly — no `module`, no login shell).
          export PATH="$HOME/.env-3.11/bin:$PATH"
          command -v apptainer >/dev/null || { echo "::error::apptainer shim not on PATH (~/.env-3.11/bin)"; exit 1; }
          IMG="$HOME/.scitex/dev/containers/ci-cpu.sif"
          if [ ! -f "$IMG" ]; then
            echo "::error::CI SIF missing at $IMG — rebuild it: scitex-container apptainer build ci-cpu"
            exit 1
          fi
          V="${{ matrix.python-version }}"
          export APPTAINER_TMPDIR=/data/gpfs/projects/punim0264/ywatanabe/ci/apptainer-tmp
          mkdir -p "$APPTAINER_TMPDIR"
          # Read-only SIF, NO install: the in-container setup (PYTHONPATH=src +
          # the baked venv bin on PATH) lives in .github/ci/run-in-sif.sh.
          # --bind punim0264 so the $HOME/.scitex symlink resolves inside.
          apptainer exec --pwd "$PWD" --bind /data/gpfs/projects/punim0264 \
            "$IMG" bash .github/ci/run-in-sif.sh "$V"
      - name: Upload coverage to Codecov
        if: always() && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  audit:
    name: audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Set up Python 3.12 (uv-managed)
        run: uv python install 3.12
      - name: Install package + audit tooling
        run: |
          uv venv --python 3.12 .venv
          uv pip install --python .venv/bin/python -e ".[dev]"
          uv pip install --python .venv/bin/python "scitex-dev[cli-audit]"
      - name: Run scitex-dev ecosystem audit-all
        run: |
          export PATH="$PWD/.venv/bin:$PATH"
          scitex-dev ecosystem audit-all scitex-path --no-version-check
