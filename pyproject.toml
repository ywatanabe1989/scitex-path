[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "scitex-path"
version = "0.1.0"
description = "Scientific project path utilities (find, split, symlink, versioning)"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [
    { name = "Yusuke Watanabe" },
]
keywords = ["path", "utilities", "science", "versioning", "symlink"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.urls]
Homepage = "https://github.com/ywatanabe1989/scitex-path"
Repository = "https://github.com/ywatanabe1989/scitex-path"

[tool.hatch.build.targets.wheel]
packages = ["src/scitex_path"]
